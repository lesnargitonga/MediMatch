<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1350" height="520" viewBox="0 0 1350 520">
  <defs>
    <style>
      .title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #1a202c; }
      .layer { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #2563eb; }
      .desc { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .mock { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #b45309; }
      .footer { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .box { fill: #fff; stroke: #2563eb; stroke-width: 2; rx: 10; ry: 10; }
      .arrow { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 6 6; }
    </style>

    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="60" y="70" class="title">Figure 4.1 — MediMatch System Architecture</text>

  <!-- Presentation Layer -->
  <g>
    <rect x="40" y="160" width="250" height="180" class="box"/>
    <text x="60" y="190" class="layer">Presentation Layer</text>
    <text x="60" y="220" class="desc">React + TypeScript (client)</text>
    <text x="60" y="245" class="desc">Login, Dashboard, Listings UI,</text>
    <text x="60" y="270" class="desc"> Map</text>

  </g>

  <!-- Application Layer -->
  <g>
    <rect x="460" y="160" width="320" height="210" class="box"/>
    <text x="480" y="190" class="layer">Application Layer</text>
    <text x="480" y="220" class="desc">Node.js + Express (server)</text>
    <text x="480" y="245" class="desc">Auth, Validation (Zod)</text>
    <text x="480" y="270" class="desc">Matching logic</text>
    <text x="480" y="295" class="desc">
      <tspan x="480">System: Health, Readiness,</tspan>
      <tspan x="480" dy="20">Stats, Middleware</tspan>
    </text>
  </g>

  <!-- Data Layer -->
  <g>
    <rect x="900" y="160" width="320" height="210" class="box"/>
    <text x="920" y="190" class="layer">Data Layer</text>
    <text x="920" y="220" class="desc">PostgreSQL + PostGIS (prod)</text>
    <text x="920" y="245" class="desc">Users, Listings, Matches</text>
    <text x="920" y="265" class="desc">(persistent)</text>
    <text x="920" y="290" class="mock">JSON/file mock fallback (dev)</text>
  </g>

  <!-- HTTPS / REST arrow -->
  <path d="M 290 260 L 460 260" class="arrow" />
  <text x="375" y="240" class="desc" text-anchor="middle">HTTPS / REST</text>

  <!-- DB API arrow -->
  <path d="M 780 260 L 900 260" class="arrow" />
  <text x="840" y="240" class="desc" text-anchor="middle">DB API</text>

  <!-- Dashed optional arrow -->
  <path d="M 780 320 L 950 400" class="arrow dashed" />
  <text x="980" y="420" class="desc">Optional (File DB / Mock)</text>

  <!-- Footer -->
  <rect x="60" y="440" width="1220" height="44" rx="8" ry="8" fill="#f8fafc"/>
  <text x="90" y="468" class="footer">Ports: Server (4000) · Postgres (5432)</text>
</svg>
